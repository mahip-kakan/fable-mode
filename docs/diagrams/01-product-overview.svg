<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Fable Mode Product Overview</title>
  <desc id="desc">Problem, Fable loop, and outcome</desc>
  <defs>
    <style>
      .title { font: 700 24px Helvetica, Arial, sans-serif; fill: #312E81; }
      .subtitle { font: 400 14px Helvetica, Arial, sans-serif; fill: #4F46E5; }
      .label { font: 700 12px Helvetica, Arial, sans-serif; letter-spacing: 0.08em; }
      .h2 { font: 700 18px Helvetica, Arial, sans-serif; }
      .body { font: 400 13px Helvetica, Arial, sans-serif; }
      .small { font: 400 11px Helvetica, Arial, sans-serif; }
      .footer { font: 400 11px Helvetica, Arial, sans-serif; fill: #94A3B8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#FFFFFF"/>
  <text x="40" y="48" class="title">Fable Mode — Product Overview</text>
  <text x="40" y="74" class="subtitle">Turn agent chaos into staged, evidence-backed delivery</text>

  <rect x="40" y="110" width="320" height="340" rx="12" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="60" y="138" class="label" fill="#B91C1C">THE PROBLEM</text>
  <text x="60" y="168" class="h2" fill="#991B1B">Procedure failures</text>
  <text x="60" y="198" class="body" fill="#7F1D1D">
    <tspan x="60" dy="0">• Happy-path code ships, edge cases 500</tspan>
    <tspan x="60" dy="22">• Claims sound right, sources never read</tspan>
    <tspan x="60" dy="22">• SQL runs, silent nulls skew results</tspan>
    <tspan x="60" dy="22">• Session 2 guesses where session 1 stopped</tspan>
  </text>

  <rect x="400" y="110" width="360" height="340" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="420" y="138" class="label" fill="#4338CA">FABLE MODE</text>
  <text x="420" y="168" class="h2" fill="#312E81">The Fable Loop</text>
  <rect x="420" y="190" width="150" height="44" rx="8" fill="#FFFFFF" stroke="#6366F1"/>
  <text x="495" y="218" text-anchor="middle" class="body" fill="#1E1B4B">1. Stage map</text>
  <rect x="590" y="190" width="150" height="44" rx="8" fill="#FFFFFF" stroke="#6366F1"/>
  <text x="665" y="218" text-anchor="middle" class="body" fill="#1E1B4B">2. Delegate</text>
  <rect x="420" y="252" width="150" height="44" rx="8" fill="#F5F3FF" stroke="#7C3AED"/>
  <text x="495" y="280" text-anchor="middle" class="body" fill="#4C1D95">3. Proof check</text>
  <rect x="590" y="252" width="150" height="44" rx="8" fill="#FFFFFF" stroke="#6366F1"/>
  <text x="665" y="280" text-anchor="middle" class="body" fill="#1E1B4B">4. Delivery review</text>
  <rect x="420" y="314" width="320" height="52" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-dasharray="8 8"/>
  <text x="580" y="346" text-anchor="middle" class="small" fill="#5B21B6">Proof Block — PASS | FAIL | UNVERIFIED</text>
  <text x="580" y="398" text-anchor="middle" class="small" fill="#4338CA" font-style="italic">Each stage earns the next — like chapters in a fable</text>

  <rect x="800" y="110" width="320" height="340" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="820" y="138" class="label" fill="#047857">THE OUTCOME</text>
  <text x="820" y="168" class="h2" fill="#065F46">Evidence-backed delivery</text>
  <text x="820" y="198" class="body" fill="#14532D">
    <tspan x="820" dy="0">• Bugs caught before merge, not in prod</tspan>
    <tspan x="820" dy="22">• Claims trace to sources actually read</tspan>
    <tspan x="820" dy="22">• Data checks run before conclusions</tspan>
    <tspan x="820" dy="22">• Multi-session work stays coherent</tspan>
  </text>

  <line x1="360" y1="280" x2="400" y2="280" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="760" y1="280" x2="800" y2="280" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="500" text-anchor="middle" class="footer">Fable Mode — procedure skill for Cursor and Claude Code  |  Mahip Kakan</text>
</svg>
