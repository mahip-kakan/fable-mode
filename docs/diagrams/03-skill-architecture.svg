<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Fable Mode Skill Architecture</title>
  <desc id="desc">Master skill and model-pinned variants</desc>
  <defs>
    <style>
      .title { font: 700 26px Helvetica, Arial, sans-serif; fill: #312E81; }
      .subtitle { font: 400 14px Helvetica, Arial, sans-serif; fill: #4F46E5; }
      .box-title { font: 700 14px Helvetica, Arial, sans-serif; }
      .tag { font: 700 11px Helvetica, Arial, sans-serif; letter-spacing: 0.06em; }
      .body { font: 400 12px Helvetica, Arial, sans-serif; }
      .note { font: 400 12px Helvetica, Arial, sans-serif; fill: #475569; font-style: italic; }
      .footer { font: 400 11px Helvetica, Arial, sans-serif; fill: #94A3B8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1200" height="640" fill="#FFFFFF"/>
  <text x="600" y="44" text-anchor="middle" class="title">Fable Mode — Skill Architecture</text>
  <text x="600" y="70" text-anchor="middle" class="subtitle">Master skill + model-pinned variants (full loop inlined for subagents)</text>

  <rect x="400" y="110" width="400" height="180" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="3"/>
  <text x="600" y="142" text-anchor="middle" class="box-title" fill="#1E1B4B">fable-mode</text>
  <text x="600" y="160" text-anchor="middle" class="tag" fill="#4338CA">MASTER SKILL</text>
  <text x="600" y="188" text-anchor="middle" class="body" fill="#312E81">fable-mode/SKILL.md</text>
  <text x="600" y="214" text-anchor="middle" class="body" fill="#312E81">
    <tspan x="600" dy="0">Full Fable loop · Proof Blocks · Domain patterns</tspan>
    <tspan x="600" dy="18">Runs inline on host model</tspan>
  </text>

  <path d="M430 310 L810 310 L780 340 L600 360 L420 340 Z" fill="#F8FAFC" stroke="#94A3B8"/>
  <text x="600" y="338" text-anchor="middle" class="body" fill="#475569">Host agent (Cursor / Claude Code)</text>

  <line x1="600" y1="290" x2="600" y2="310" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="400" width="280" height="160" rx="12" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="2"/>
  <text x="220" y="432" text-anchor="middle" class="box-title" fill="#0C4A6E">fable-sonnet</text>
  <text x="220" y="450" text-anchor="middle" class="tag" fill="#0284C7">VARIANT</text>
  <text x="220" y="478" text-anchor="middle" class="body" fill="#0C4A6E">
    <tspan x="220" dy="0">Spawn Sonnet subagent</tspan>
    <tspan x="220" dy="18">Full loop inlined</tspan>
    <tspan x="220" dy="18">Balanced cost / quality</tspan>
  </text>

  <rect x="460" y="400" width="280" height="160" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="600" y="432" text-anchor="middle" class="box-title" fill="#064E3B">fable-haiku</text>
  <text x="600" y="450" text-anchor="middle" class="tag" fill="#047857">VARIANT</text>
  <text x="600" y="478" text-anchor="middle" class="body" fill="#064E3B">
    <tspan x="600" dy="0">Spawn Haiku subagent</tspan>
    <tspan x="600" dy="18">Full loop inlined</tspan>
    <tspan x="600" dy="18">Fast / cost-sensitive</tspan>
  </text>

  <rect x="840" y="400" width="280" height="160" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="980" y="432" text-anchor="middle" class="box-title" fill="#78350F">fable-fast</text>
  <text x="980" y="450" text-anchor="middle" class="tag" fill="#B45309">ALIAS → fable-haiku</text>
  <text x="980" y="478" text-anchor="middle" class="body" fill="#78350F">
    <tspan x="980" dy="0">Backward compatibility</tspan>
    <tspan x="980" dy="18">Same loop as Haiku</tspan>
  </text>

  <line x1="480" y1="350" x2="220" y2="400" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="360" x2="600" y2="400" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="350" x2="980" y2="400" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M840 480 L760 480" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6 6" fill="none" marker-end="url(#arrow)"/>
  <text x="800" y="474" class="body" fill="#B45309">points to</text>

  <rect x="80" y="590" width="1040" height="36" rx="8" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="600" y="613" text-anchor="middle" class="note">Subagents do not auto-load sibling skills — variants inline the full master loop</text>
  <text x="600" y="578" text-anchor="middle" class="footer">Install all four folders to ~/.cursor/skills/ · Invoke by skill name or qualifying task</text>
</svg>
