    <text x="190.0" y="215.0" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="14" fill="#312e81">Looks correct</text>
  </g>
  <line x1="190" y1="175" x2="190" y2="190" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#dc2626"/></marker></defs><text x="40" y="270" font-family="Inter,Segoe UI,sans-serif" font-size="14" fill="#dc2626">Ships → 500 on unauthenticated request</text><text x="440" y="110" font-family="Inter,Segoe UI,sans-serif" font-size="15" fill="#059669">FABLE MODE</text>
  <g filter="url(#shadow)">
    <rect x="400" y="125" width="140" height="48" rx="12" fill="#ffedd5" stroke="#c2410c" stroke-width="2"/>
    <text x="470.0" y="149.0" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="13" fill="#312e81">Stage map</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="560" y="125" width="140" height="48" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="630.0" y="149.0" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="13" fill="#312e81">Tests first</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="400" y="190" width="300" height="50" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="550.0" y="215.0" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="14" fill="#312e81">Proof FAIL → null guard</text>
  </g>
