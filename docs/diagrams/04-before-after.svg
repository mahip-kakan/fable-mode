<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" width="920" height="420">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#312e8120"/>
    </filter>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/><text x="40" y="42" font-family="Inter,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#312e81">Before / After</text><text x="40" y="70" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#4f46e5">Same task — different procedure</text><text x="60" y="110" font-family="Inter,Segoe UI,sans-serif" font-size="15" fill="#dc2626">ONE-SHOT</text>
  <g filter="url(#shadow)">
    <rect x="40" y="125" width="300" height="50" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
