    <rect x="400" y="255" width="300" height="50" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="550.0" y="280.0" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="14" fill="#312e81">Proof PASS → ship</text>
  </g>
