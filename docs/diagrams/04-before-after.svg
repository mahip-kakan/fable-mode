  <defs><marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#059669"/></marker></defs>
  <line x1="550" y1="240" x2="550" y2="255" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#059669"/></marker></defs>
  <g filter="url(#shadow)">
    <rect x="180" y="320" width="560" height="56" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="460.0" y="348.0" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="15" fill="#312e81">Measured: 1 pass / 1 fail  →  3 pass / 0 fail</text>
