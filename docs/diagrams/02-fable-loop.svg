<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">The Fable Loop</title>
  <desc id="desc">Four-step loop with Proof Block</desc>
  <defs>
    <style>
      .title { font: 700 26px Helvetica, Arial, sans-serif; fill: #312E81; }
      .subtitle { font: 400 14px Helvetica, Arial, sans-serif; fill: #4F46E5; }
      .step { font: 700 14px Helvetica, Arial, sans-serif; }
      .step-body { font: 400 13px Helvetica, Arial, sans-serif; }
      .small { font: 400 11px Helvetica, Arial, sans-serif; }
      .code { font: 400 12px Courier New, monospace; fill: #312E81; }
      .note { font: 400 12px Helvetica, Arial, sans-serif; fill: #92400E; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="#FFFFFF"/>
  <text x="600" y="48" text-anchor="middle" class="title">The Fable Loop</text>
  <text x="600" y="74" text-anchor="middle" class="subtitle">Every stage ends with a Proof Block — evidence that can fail</text>

  <rect x="60" y="120" width="220" height="160" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="170" y="150" text-anchor="middle" class="step" fill="#1E1B4B">1 — Stage map</text>
  <text x="170" y="178" text-anchor="middle" class="step-body" fill="#312E81">
    <tspan x="170" dy="0">Numbered stages</tspan>
    <tspan x="170" dy="18">Expected outputs</tspan>
    <tspan x="170" dy="18">Done-when criteria</tspan>
  </text>
  <text x="170" y="258" text-anchor="middle" class="small" fill="#4338CA">Before any edits</text>

  <rect x="320" y="120" width="220" height="160" rx="12" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="2"/>
  <text x="430" y="150" text-anchor="middle" class="step" fill="#0C4A6E">2 — Delegate</text>
  <text x="430" y="178" text-anchor="middle" class="step-body" fill="#0C4A6E">
    <tspan x="430" dy="0">Parallel subagents</tspan>
    <tspan x="430" dy="18">when independent</tspan>
  </text>
  <text x="430" y="248" text-anchor="middle" class="small" fill="#0369A1">One level deep · merge at host</text>

  <rect x="580" y="120" width="220" height="160" rx="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="690" y="150" text-anchor="middle" class="step" fill="#4C1D95">3 — Proof check</text>
  <text x="690" y="178" text-anchor="middle" class="step-body" fill="#4C1D95">
    <tspan x="690" dy="0">Tests, grep, diff</tspan>
    <tspan x="690" dy="18">Sources actually read</tspan>
  </text>
  <text x="690" y="248" text-anchor="middle" class="small" fill="#6D28D9">No "looks correct"</text>

  <rect x="840" y="120" width="220" height="160" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="950" y="150" text-anchor="middle" class="step" fill="#064E3B">4 — Delivery review</text>
  <text x="950" y="178" text-anchor="middle" class="step-body" fill="#064E3B">
    <tspan x="950" dy="0">Skeptical read-through</tspan>
    <tspan x="950" dy="18">Fix or flag real issues</tspan>
  </text>
  <text x="950" y="248" text-anchor="middle" class="small" fill="#047857">Confirm before flagging</text>

  <line x1="280" y1="200" x2="320" y2="200" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="200" x2="580" y2="200" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="200" x2="840" y2="200" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="180" y="320" width="840" height="200" rx="10" fill="#FAFAFA" stroke="#7C3AED" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="200" y="348" class="step" fill="#6D28D9">Proof Block (required at every stage)</text>
  <rect x="200" y="364" width="520" height="132" rx="8" fill="#FFFFFF" stroke="#C4B5FD"/>
  <text x="220" y="388" class="code">Proof N — [Stage name]: PASS | FAIL | UNVERIFIED</text>
  <text x="220" y="408" class="code">Check:   [test, grep, query, file read, diff]</text>
  <text x="220" y="428" class="code">Command: [exact command or tool call]</text>
  <text x="220" y="448" class="code">Evidence: [exit code, assertion, line count, URL]</text>
  <text x="760" y="388" class="step-body" fill="#475569">
    <tspan x="760" dy="0" font-weight="700">Acceptable</tspan>
    <tspan x="760" dy="18">• Test exit codes</tspan>
    <tspan x="760" dy="18">• Grep / diff output</tspan>
    <tspan x="760" dy="18">• Sources actually read</tspan>
    <tspan x="760" dy="26" font-weight="700">Not acceptable</tspan>
    <tspan x="760" dy="18">• "looks correct"</tspan>
  </text>
  <line x1="690" y1="280" x2="690" y2="320" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="6 6"/>

  <rect x="360" y="540" width="480" height="32" rx="8" fill="#FFFBEB" stroke="#F59E0B"/>
  <text x="600" y="561" text-anchor="middle" class="note">If stage N invalidates stage M → re-run M's proof</text>
</svg>
